services:
  ollama:
    image: ollama/ollama:latest
    container_name: orchestration-ollama-1
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_GPU_LAYERS: -1
      OLLAMA_ORIGINS: "*"
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 5s
      timeout: 5s
      retries: 3
    volumes:
      - ~/.ollama:/root/.ollama
    ports:
      - "11434:11434"
    # Use this simpler approach instead of deploy.resources
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  knowledge-extraction:
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
